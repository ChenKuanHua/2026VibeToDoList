<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- 背景色：與專案 bg-color 相同 -->
  <rect width="100%" height="100%" fill="#fdfbf7" />

  <!-- 定義箭頭樣式 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4bba3" />
    </marker>
  </defs>

  <g font-family="monospace">
    
    <!-- ======= 主流程連線 ======= -->
    <g stroke="#d4bba3" stroke-width="2" fill="none" marker-end="url(#arrow)">
      <!-- 主視圖垂直連線 -->
      <path d="M 400 120 L 400 192" />
      <path d="M 400 260 L 400 332" />
      <path d="M 400 400 L 400 472" />

      <!-- 左側輔助工具連入 -->
      <path d="M 220 230 L 292 230" />
      <path d="M 140 120 L 140 210 L 292 210" />

      <!-- 右側 Context 狀態流向 -->
      <path d="M 660 250 L 660 128" />
      <path d="M 570 270 L 540 270 L 540 230 L 508 230" />
      <path d="M 570 310 L 540 310 L 540 370 L 508 370" />
    </g>

    <!-- 連線文字註解 -->
    <g fill="#8c8477" font-size="12" font-family="sans-serif">
      <text x="670" y="195">讀取/寫入</text>
      <text x="515" y="220">共享計時及狀態</text>
      <text x="515" y="390">共享任務陣列</text>
      <text x="235" y="222">呼叫</text>
    </g>

    <!-- ======= 節點繪製 ======= -->
    
    <!-- [中] App.jsx -->
    <g transform="translate(300, 60)">
      <rect width="200" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="100" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">App.jsx</text>
      <text x="100" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">專案初始化與主佈局</text>
    </g>

    <!-- [中] Pomodoro.jsx -->
    <g transform="translate(300, 200)">
      <rect width="200" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="100" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">Pomodoro.jsx</text>
      <text x="100" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">計時器與休息伸展呈現</text>
    </g>

    <!-- [中] TaskList.jsx -->
    <g transform="translate(300, 340)">
      <rect width="200" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="100" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">TaskList.jsx</text>
      <text x="100" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">任務陣列管理與過濾</text>
    </g>

    <!-- [中] TaskItem.jsx -->
    <g transform="translate(300, 480)">
      <rect width="200" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="100" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">TaskItem.jsx</text>
      <text x="100" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">單一任務狀態與操作</text>
    </g>

    <!-- [右] LocalStorage -->
    <g transform="translate(570, 60)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">LocalStorage</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">全域資料持久化儲存</text>
    </g>

    <!-- [右] TimerContext.jsx -->
    <g transform="translate(570, 250)">
      <rect width="180" height="80" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">TimerContext.jsx</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">全域狀態與計時邏輯</text>
      <text x="90" y="66" fill="#b0a79a" font-size="11" text-anchor="middle">(任務 / 時間流 / 模式)</text>
    </g>

    <!-- [左] NASM CPT -->
    <g transform="translate(60, 60)">
      <rect width="160" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="80" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">NASM CPT Array</text>
      <text x="80" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">專業伸展動作資料庫</text>
    </g>

    <!-- [左] formatTime.js -->
    <g transform="translate(60, 200)">
      <rect width="160" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="80" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">formatTime.js</text>
      <text x="80" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">時間格式轉化 (MM:SS)</text>
    </g>

  </g>
</svg>
