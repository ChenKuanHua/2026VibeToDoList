<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <!-- 背景色：與專案區塊背景相同 -->
  <rect width="100%" height="100%" fill="#fdfbf7" />

  <!-- 定義箭頭樣式 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4bba3" />
    </marker>
  </defs>

  <g font-family="monospace">
    
    <!-- ======= 主流程連線 ======= -->
    <g stroke="#d4bba3" stroke-width="2" fill="none" marker-end="url(#arrow)">
      <!-- app.css -> index.html -->
      <path d="M 230 80 L 302 80" />
      <!-- index.html -> app.js -->
      <path d="M 400 110 L 400 162" />
      
      <!-- app.js -> (Timer, State, Task) -->
      <path d="M 400 230 L 400 250" marker-end="none" />
      <path d="M 140 250 L 660 250" marker-end="none" />
      <path d="M 140 250 L 140 282" />
      <path d="M 400 250 L 400 282" />
      <path d="M 660 250 L 660 282" />

      <!-- Timer -> State -->
      <path d="M 230 320 L 302 320" />
      <!-- Task -> State -->
      <path d="M 570 320 L 498 320" />

      <!-- Timer -> NASM -->
      <path d="M 140 350 L 140 402" />
      <!-- Task -> Matrix -->
      <path d="M 660 350 L 660 402" />
      <!-- State -> DOM -->
      <path d="M 400 350 L 400 402" />
    </g>

    <!-- 連線文字註解 -->
    <g fill="#8c8477" font-size="12" font-family="sans-serif">
      <text x="245" y="72">聯動樣式</text>
      <text x="410" y="142">Script 進入點</text>
      <text x="150" y="385">抽取動作</text>
      <text x="670" y="385">屬性過濾</text>
      <text x="410" y="385">驅動畫面 (Light Update)</text>
      <text x="235" y="312">更新 TimeLeft</text>
      <text x="502" y="312">更新 Tasks</text>
    </g>

    <!-- ======= 節點繪製 ======= -->
    
    <!-- [中] index.html -->
    <g transform="translate(310, 50)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">index.html</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">靜態結構與視圖層</text>
    </g>

    <!-- [左] app.css -->
    <g transform="translate(50, 50)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">app.css</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">極簡主題與平滑動畫</text>
    </g>

    <!-- [中] app.js -->
    <g transform="translate(310, 170)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">app.js</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">核心互動與控制器</text>
    </g>

    <!-- [左] Timer Engine -->
    <g transform="translate(50, 290)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">Timer Loop</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">番茄鐘每秒時鐘輪詢</text>
    </g>

    <!-- [中] State Engine -->
    <g transform="translate(310, 290)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">State Management</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">狀態資料與主題控制</text>
    </g>

    <!-- [右] Task Engine -->
    <g transform="translate(570, 290)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">Task Engine</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">任務邏輯與日期推算</text>
    </g>

    <!-- [左] NASM CPT -->
    <g transform="translate(50, 410)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">NASM CPT Array</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">預定義專業伸展庫</text>
    </g>

    <!-- [中] DOM Updater -->
    <g transform="translate(310, 410)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">DOM Updater</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">負責無閃爍介面渲染</text>
    </g>

    <!-- [右] Matrix View -->
    <g transform="translate(570, 410)">
      <rect width="180" height="60" rx="12" fill="rgba(74,68,58,0.9)" stroke="#d4bba3" stroke-width="2" />
      <text x="90" y="26" fill="#d4bba3" font-size="15" font-weight="bold" text-anchor="middle">Matrix Render</text>
      <text x="90" y="46" fill="#fdfbf7" font-size="12" text-anchor="middle">艾森豪四象限渲染生成</text>
    </g>

  </g>
</svg>
