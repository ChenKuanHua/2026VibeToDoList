<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- 單色設定: 使用專案主字體顏色 text-primary -->
  <g fill="none" stroke="#4a443a" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 主體：番茄鐘外框 -->
    <circle cx="250" cy="220" r="130" />

    <!-- 頂端：計時器按鈕 -->
    <path d="M 210 50 L 290 50" stroke-width="24" />
    <path d="M 250 50 L 250 90" stroke-width="24" />

    <!-- 中央：打勾符號與時鐘指針概念結合 -->
    <path d="M 190 230 L 235 275 L 320 170" />

    <!-- 底部：站立式升降辦公桌 -->
    <path d="M 100 410 L 400 410" stroke-width="20" stroke-linecap="round" />
    <path d="M 160 410 L 160 480" />
    <path d="M 340 410 L 340 480" />
    
  </g>
</svg>
