<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 主體容器：貓咪造型時鐘 (耳朵圓潤化) -->
  <g transform="translate(256, 280)">
    
    <!-- 圓潤貓耳 (使用二次貝茲曲線加強可愛感) -->
    <path d="M -90 -115 Q -140 -200 -35 -140 Z" fill="#4a443a" />
    <path d="M 90 -115 Q 140 -200 35 -140 Z" fill="#4a443a" />

    <!-- 貓頭時鐘外框 (深褐色) -->
    <circle cx="0" cy="0" r="145" fill="#4a443a" filter="url(#shadow)" />
    
    <!-- 錶面 (奶油白) -->
    <circle cx="0" cy="0" r="120" fill="#fdfbf7" />

    <!-- 內部裝飾：簡約刻度 -->
    <line x1="0" y1="-95" x2="0" y2="-105" stroke="#4a443a" stroke-width="8" stroke-linecap="round" />
    <line x1="95" y1="0" x2="105" y2="0" stroke="#4a443a" stroke-width="8" stroke-linecap="round" />
    <line x1="0" y1="95" x2="0" y2="105" stroke="#4a443a" stroke-width="8" stroke-linecap="round" />
    <line x1="-95" y1="0" x2="-105" y2="0" stroke="#4a443a" stroke-width="8" stroke-linecap="round" />

    <!-- 打勾符號 (暖米色) -->
    <path d="M -45 5 L -10 40 L 55 -35" fill="none" stroke="#d4bba3" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 中心點 -->
    <circle cx="0" cy="0" r="8" fill="#4a443a" />
  </g>
</svg>
